name: Build and Release Exe
on:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pyotp pwinput pywin32 psutil beautifulsoup4

    - name: Set up MinGW
      uses: msys2/setup-msys2@v2
      with:
        install: mingw-w64-x86_64-gcc

    - name: Clone and Rebuild PyInstaller Bootloader with MinGW (gcc)
      run: |
        $env:PATH = "C:\msys64\mingw64\bin;" + $env:PATH
        git clone https://github.com/pyinstaller/pyinstaller.git
        cd pyinstaller/bootloader
        python ./waf distclean all --gcc
        cd ..
        pip install -e .

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --icon=icon.ico launcher.py

    - name: Upload Exe to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/launcher.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
