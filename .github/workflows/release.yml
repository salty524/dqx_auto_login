name: Build and Release Exe
on:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pyotp pwinput pywin32 psutil beautifulsoup4 nuitka zstandard

    - name: Build with Nuitka
      run: |
        python -m nuitka --onefile --windows-console-mode=attach --windows-icon-from-ico=icon.ico --output-dir=dist --assume-yes-for-downloads launcher.py

    - name: Upload Exe to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/launcher.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
